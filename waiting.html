<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Pending | PushIdea</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1067/1067357.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/waiting.css">
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-name">PushIdea</span>
  </div>

  <div class="icon-wrap">
    <div class="icon-ring ring-1"></div>
    <div class="icon-ring ring-2"></div>
    <div class="icon-ring ring-3"></div>
    <div class="icon-center">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/>
      </svg>
    </div>
  </div>

  <h1>Account Under Review</h1>
  <p class="sub">Your profile is being verified by our admin team.<br><strong>You will be redirected automatically once approved.</strong></p>

  <div class="steps">
    <div class="step">
      <div class="step-dot step-done">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span class="step-lbl done">Registered</span>
    </div>
    <div class="step-conn"></div>
    <div class="step">
      <div class="step-dot step-active">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#92400e" stroke-width="2.5"><circle cx="12" cy="12" r="3"/></svg>
      </div>
      <span class="step-lbl active">Reviewing</span>
    </div>
    <div class="step-conn" style="background:linear-gradient(90deg,#fcd34d,#e2e8f0);"></div>
    <div class="step">
      <div class="step-dot step-pending">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <span class="step-lbl">Access</span>
    </div>
  </div>

  <div class="status-box">
    <div class="status-header">
      <div class="live-dot"></div>
      <span class="status-lbl">Live Status</span>
    </div>
    <p id="statusText">Waiting for admin action…</p>
  </div>

  <button onclick="window.auth.signOut().then(()=>window.location.replace('index.html'))" class="logout-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Log Out &amp; Check Later
  </button>
  <p class="tip">Typically reviewed within 24–48 hours · Do not close this tab</p>
</div>

<script type="module" src="js/waiting.js"></script>
</body>
</html>
